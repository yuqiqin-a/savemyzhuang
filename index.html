<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拯救我的壮语计划</title>
  <meta name="description" content="一个围绕东兰片壮语展开的个人语言存档网站，收录词汇对照、方言比较与录音资料。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: rgba(255, 251, 245, 0.86);
      --paper-strong: rgba(255, 248, 239, 0.95);
      --line: rgba(58, 45, 34, 0.12);
      --text: #2d241c;
      --muted: #705d4c;
      --accent: #1d6b5f;
      --accent-strong: #174d45;
      --berry: #8d4a3a;
      --shadow: 0 18px 50px rgba(58, 45, 34, 0.12);
      --radius-lg: 28px;
      --max: 1320px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Manrope", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(185, 132, 51, 0.22), transparent 32%),
        radial-gradient(circle at top right, rgba(29, 107, 95, 0.18), transparent 28%),
        linear-gradient(180deg, #f9f2e6 0%, #f6efe3 38%, #efe4d3 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255,255,255,0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.22) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 95%);
    }

    .shell {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 24px 0 80px;
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 34px;
      padding: 36px;
      min-height: 460px;
      background:
        linear-gradient(135deg, rgba(255, 251, 245, 0.96), rgba(246, 234, 214, 0.92)),
        linear-gradient(120deg, rgba(29, 107, 95, 0.08), rgba(185, 132, 51, 0.08));
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      isolation: isolate;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: -1;
    }

    .hero::before {
      width: 320px;
      height: 320px;
      right: -90px;
      top: -120px;
      background: radial-gradient(circle, rgba(29, 107, 95, 0.18), transparent 68%);
    }

    .hero::after {
      width: 280px;
      height: 280px;
      left: -80px;
      bottom: -120px;
      background: radial-gradient(circle, rgba(185, 132, 51, 0.18), transparent 70%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(58,45,34,0.08);
      color: var(--accent-strong);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1, h2, h3 {
      font-family: "Noto Serif SC", serif;
      margin: 0;
      letter-spacing: -0.03em;
    }

    .hero h1 {
      margin-top: 20px;
      font-size: clamp(2.2rem, 5vw, 4.6rem);
      line-height: 0.94;
      max-width: none;
      white-space: nowrap;
    }

    .hero p {
      max-width: 62ch;
      line-height: 1.8;
      color: var(--muted);
      font-size: 1.04rem;
      margin: 18px 0 0;
    }

    .hero-copy { display: flex; flex-direction: column; justify-content: space-between; }

    .panel, .view, .word-card, .table-shell {
      backdrop-filter: blur(12px);
      background: var(--paper);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: var(--shadow);
    }

    .hero-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      color: var(--accent-strong);
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: 180ms ease;
    }

    .icon-link:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.94);
    }

    .icon-link svg {
      width: 24px;
      height: 24px;
    }

    .section { margin-top: 28px; }

    .panel {
      border-radius: var(--radius-lg);
      padding: 26px;
      background: var(--paper-strong);
    }

    .controls { display: grid; gap: 14px; }

    .control-row {
      display: grid;
      grid-template-columns: minmax(280px, 560px) auto;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .filter-line {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .filter-stack {
      display: grid;
      gap: 12px;
    }

    .filter-group {
      display: grid;
      gap: 10px;
    }

    .filter-heading {
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    .search-wrap { position: relative; }

    .search-wrap input {
      width: 100%;
      padding: 16px 18px 16px 48px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.86);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .search-wrap::before {
      content: "⌕";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1.1rem;
    }

    .segmented {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .segmented button, .page-button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 180ms ease;
    }

    .segmented button.active, .page-button.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 22px rgba(29, 107, 95, 0.22);
    }

    .page-button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.76);
    }

    .page-button:disabled { opacity: 0.45; cursor: not-allowed; }

    .page-jump {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: text;
    }

    .page-input {
      width: 4ch;
      min-width: 46px;
      padding: 2px 4px;
      border: 1px solid rgba(255,255,255,0.44);
      border-radius: 8px;
      background: rgba(255,255,255,0.18);
      color: inherit;
      font: inherit;
      font-weight: 800;
      text-align: center;
      outline: none;
    }

    .page-input:focus {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.82);
    }

    .word-card:hover,
    .word-card:focus-within {
      z-index: 20;
    }

    .tooltip-term {
      position: relative;
      cursor: help;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }

    .tooltip-term::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      z-index: 30;
      width: max-content;
      max-width: 220px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(45, 36, 28, 0.94);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.35;
      text-align: left;
      white-space: normal;
      box-shadow: 0 12px 24px rgba(45, 36, 28, 0.18);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 4px);
      transition: 160ms ease;
    }

    .tooltip-term:hover::after,
    .tooltip-term:focus-visible::after {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
      position: relative;
      cursor: pointer;
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .toggle-box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid rgba(29, 107, 95, 0.34);
      background: rgba(255,255,255,0.88);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: 180ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .toggle-box::after {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 3px;
      background: var(--accent);
      transform: scale(0);
      transition: transform 180ms ease;
    }

    .toggle input:checked + .toggle-box {
      border-color: var(--accent);
      background: rgba(29, 107, 95, 0.1);
    }

    .toggle input:checked + .toggle-box::after { transform: scale(1); }
    .toggle input:focus-visible + .toggle-box {
      outline: 2px solid rgba(29, 107, 95, 0.28);
      outline-offset: 2px;
    }

    .results-bar, .pagination {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .results-bar {
      justify-content: flex-start;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .view { border-radius: 30px; padding: 18px; margin-top: 18px; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .word-card {
      position: relative;
      z-index: 0;
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,248,239,0.78));
      min-height: 320px;
    }

    .word-top {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      padding-right: 164px;
      min-height: 60px;
    }
    .word-id { font-size: 0.82rem; font-weight: 800; letter-spacing: 0.08em; color: var(--berry); text-transform: uppercase; }
    .word-card h3 { font-size: 1.5rem; margin-top: 6px; }
    .tag-rack {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 150px;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.1;
      text-align: center;
      border: 1px solid transparent;
      white-space: nowrap;
      box-shadow: 0 8px 16px rgba(58, 45, 34, 0.08);
    }
    .pronunciations { display: grid; gap: 10px; }

    .pronunciation-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(58,45,34,0.12);
    }

    .pronunciation-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .label { color: var(--muted); font-size: 0.88rem; font-weight: 700; }
    .value { font-size: 0.98rem; line-height: 1.6; word-break: break-word; }
    .value.empty { color: rgba(112,93,76,0.5); font-style: italic; }
    .value-meta { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .value-stack { display: grid; gap: 6px; }
    .value-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: baseline;
    }
    .value-inline--thai {
      width: 100%;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .value-inline--standard {
      width: 100%;
      align-items: center;
      gap: 12px;
    }
    .value-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
    }
    .value-copy--thai {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: nowrap;
    }
    .value-copy .value,
    .value-copy .value-meta {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .play-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(29, 97, 214, 0.22);
      background: #2f6fe4;
      color: #fff;
      cursor: pointer;
      transition: 180ms ease;
    }
    .play-link:hover {
      transform: translateY(-1px);
      background: #245dcb;
      border-color: rgba(29, 97, 214, 0.34);
    }
    .play-link:focus-visible {
      outline: 2px solid rgba(47, 111, 228, 0.28);
      outline-offset: 2px;
    }
    .play-link.is-playing {
      background: #174fb8;
    }
    .play-link svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .value-block { display: grid; gap: 8px; }
    .grouped-block {
      display: grid;
      gap: 10px;
      margin-left: -14px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(58,45,34,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .grouped-block .pronunciation-row {
      padding: 0;
      border-bottom: 0;
    }
    .audio-box {
      margin-top: 2px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .recording-button {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      column-gap: 9px;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 15px;
      border: 1px solid rgba(29, 107, 95, 0.16);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      box-shadow: 0 8px 18px rgba(58, 45, 34, 0.07);
      transition: 180ms ease;
    }

    .recording-button:hover {
      transform: translateY(-1px);
      border-color: rgba(29, 107, 95, 0.34);
      background: rgba(255,255,255,0.9);
    }

    .recording-button:focus-visible {
      outline: 2px solid rgba(29, 107, 95, 0.28);
      outline-offset: 2px;
    }

    .recording-button.is-playing {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px rgba(29, 107, 95, 0.22);
    }

    .recording-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: rgba(29, 107, 95, 0.1);
      color: var(--accent-strong);
    }

    .recording-button.is-playing .recording-icon {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .recording-icon svg {
      width: 13px;
      height: 13px;
    }

    .recording-speaker {
      display: inline-flex;
      align-items: baseline;
      gap: 1px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .recording-index {
      font-size: 0.62em;
      font-weight: 800;
      line-height: 1;
      transform: translateY(0.24em);
    }

    audio {
      width: 100%;
      display: block;
      min-height: 42px;
    }

    .table-shell {
      overflow: hidden;
      border-radius: 24px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(255,255,255,0.66);
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(29,107,95,0.08); }
    th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(58,45,34,0.08); vertical-align: top; }
    th { font-size: 0.86rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent-strong); }
    td { font-size: 0.96rem; }
    tbody tr:hover { background: rgba(29,107,95,0.05); }
    .table-audio { min-width: 260px; }

    .empty-state, .loading-state {
      padding: 44px 20px;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
    }

    .loading-state { font-size: 1rem; }
    .hidden { display: none !important; }

    @media (max-width: 1120px) {
      .hero { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .control-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .shell { width: min(calc(100% - 20px), var(--max)); padding-top: 12px; }
      .hero, .panel { padding: 22px; border-radius: 24px; }
      .cards { grid-template-columns: 1fr; }
      .results-bar { align-items: flex-start; flex-direction: column; }
      .pronunciation-row { grid-template-columns: 1fr; gap: 6px; }
      .value-inline--thai,
      .value-inline--standard { align-items: center; flex-direction: row; }
      .word-top { padding-right: 0; min-height: 0; }
      .tag-rack {
        position: static;
        max-width: none;
        justify-content: flex-start;
        margin-top: 10px;
      }
      th, td { padding: 12px; }
      .table-shell { overflow-x: auto; }
      table { min-width: 1120px; }
      .audio-box { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 460px) {
      .audio-box { grid-template-columns: 1fr; }
    }
  </style>
  <script defer src="data/words.js"></script>
  <script defer src="data/audio-manifest.js"></script>
</head>
<body>

    <section class="hero">
      <div class="hero-copy">
        <div>
          <div class="hero-links">
            <a class="icon-link" href="pdf/silesr2010_025_Chinese.pdf" aria-label="中文 PDF">

          <h1>东兰壮语语音数据库</h1>
        </div>
      </div>
    </section>

    <section class="section panel">
      <div class="controls">
        <div class="control-row">
          <label class="search-wrap" for="search-input">
            <input id="search-input" type="search" placeholder="搜索序号、汉语或者英语单词">
          </label>
          <div class="segmented" id="view-picker" aria-label="选择视图">
            <button type="button" class="active" data-view="cards">卡片</button>
            <button type="button" data-view="table">表格</button>
          </div>
        </div>
        <div class="filter-stack">
          <div class="filter-group">
            <div class="filter-heading">说话人筛选</div>
            <div class="filter-line" id="speaker-picker" aria-label="选择说话人"></div>
          </div>
          <div class="filter-group">
            <div class="filter-heading">标签筛选</div>
            <div class="filter-line" id="tag-picker" aria-label="选择标签"></div>
          </div>
        </div>
        <div class="filter-line">
          <div class="pagination" id="pagination-top"></div>
        </div>
        <div class="results-bar">
          <div id="results-copy">正在载入词条…</div>
        </div>
      </div>
    </section>

    <section class="section view" id="cards-view">
      <div id="loading-state" class="loading-state">正在整理词条和录音索引…</div>
      <div id="cards" class="cards"></div>
      <div id="cards-empty" class="empty-state hidden">没有找到符合当前筛选条件的词条。可以试试更短的关键词，或调整当前筛选条件。</div>
    </section>

    <section class="section view hidden" id="table-view">
      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>汉语</th>
              <th>标准壮语</th>
              <th>现代泰语</th>
              <th>大化岩滩</th>
              <th>大化流水</th>
              <th class="table-audio">东兰大同</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div id="table-empty" class="empty-state hidden">当前条件下没有可显示的表格结果。</div>
    </section>

    <div class="pagination section" id="pagination-bottom"></div>
  </main>

  <script>
    const PAGE_SIZE = 24;
    const SPEAKER_LABELS = {
      speaker1: '父亲',
      speaker2: '奶奶'
    };
    const SWADESH_DESCRIPTION = '用于跨语言比较基础词汇的核心词表。';
    const TAG_DEFINITIONS = [
      { key: 'swadesh', label: 'Swadesh', source: 'Swadesh List', color: ['#7f3b2e', '#fff4ef', '#c98b7d'], description: SWADESH_DESCRIPTION },
      { key: 'animal', label: '动物', source: '动物', color: ['#335c67', '#eff8fb', '#88afb9'] },
      { key: 'plant', label: '植物', source: '植物', color: ['#436b2f', '#f4faef', '#9cbc87'] },
      { key: 'pronoun', label: '人称代词', source: '人称代词', color: ['#6f4ba0', '#f7f1ff', '#c5afe7'] },
      { key: 'kinship', label: '亲属', source: '亲属', color: ['#8a4b16', '#fff5ea', '#e0af7f'] },
      { key: 'verb', label: '动词', source: '动词', color: ['#0d6a73', '#edf9f8', '#7cc6c0'] },
      { key: 'adjective', label: '形容词', source: '形容词', color: ['#8d3f6b', '#fff0f8', '#d7a0bf'] },
      { key: 'number', label: '数字', source: '数字', color: ['#5a4b1d', '#fff9e8', '#d9c57a'] },
      { key: 'classifier', label: '量词', source: '量词', color: ['#35528a', '#eef4ff', '#9bb4e0'] },
      { key: 'interrogative', label: '疑问代词', source: '疑问代词', color: ['#7a3045', '#fff0f2', '#d79aaa'] },
      { key: 'body', label: '身体部位', source: '身体部位', color: ['#915227', '#fff4ee', '#dfad8b'] }
    ];

    const state = {
      words: [],
      audioManifest: {},
      speakerOrder: [],
      search: '',
      selectedSpeakers: [],
      selectedTags: [],
      view: 'cards',
      page: 1,
      loaded: false
    };

    const speakerPicker = document.getElementById('speaker-picker');
    const tagPicker = document.getElementById('tag-picker');
    const viewPicker = document.getElementById('view-picker');
    const searchInput = document.getElementById('search-input');
    const cards = document.getElementById('cards');
    const tableBody = document.getElementById('table-body');
    const resultsCopy = document.getElementById('results-copy');
    const cardsView = document.getElementById('cards-view');
    const tableView = document.getElementById('table-view');
    const cardsEmpty = document.getElementById('cards-empty');
    const tableEmpty = document.getElementById('table-empty');
    const loadingState = document.getElementById('loading-state');
    const paginationTop = document.getElementById('pagination-top');
    const paginationBottom = document.getElementById('pagination-bottom');
    const thaiAudioPlayer = new Audio();
    const donglanAudioPlayer = new Audio();
    let activeThaiPlayButton = null;
    let activeDonglanPlayButton = null;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function encodeAudioPath(path) {
      return encodeURI(path);
    }

    function labelForSpeaker(key) {
      return SPEAKER_LABELS[key] || (state.audioManifest[key] && state.audioManifest[key].label) || key;
    }

    function wordTags(word) {
      return Array.isArray(word.tags) ? word.tags : [];
    }

    function badgeStyle(tag) {
      const [text, bg, border] = tag.color;
      return `color:${text};background:${bg};border-color:${border};`;
    }

    function tagLabelMarkup(tag) {
      const label = escapeHtml(tag.label);
      if (!tag.description) return label;
      return `<span class="tooltip-term" tabindex="0" data-tooltip="${escapeHtml(tag.description)}" title="${escapeHtml(tag.description)}">${label}</span>`;
    }

    function normalizeAudioFiles(value) {
      if (!value) return [];
      if (typeof value === 'string') return [{ path: value, label: '' }];
      if (Array.isArray(value)) {
        return value.flatMap((item) => normalizeAudioFiles(item));
      }
      if (typeof value === 'object') {
        if (typeof value.path === 'string') return [{ path: value.path, label: value.label || value.name || '' }];
        if (typeof value.file === 'string') return [{ path: value.file, label: value.label || value.name || '' }];
        if (typeof value.url === 'string') return [{ path: value.url, label: value.label || value.name || '' }];
        if (typeof value.src === 'string') return [{ path: value.src, label: value.label || value.name || '' }];
        if (Array.isArray(value.paths)) return value.paths.flatMap((item) => normalizeAudioFiles(item));
        if (Array.isArray(value.files)) return value.files.flatMap((item) => normalizeAudioFiles(item));
        return Object.entries(value)
          .filter(([key]) => !['label', 'name'].includes(key))
          .flatMap(([, item]) => normalizeAudioFiles(item));
      }
      return [];
    }

    function audioEntriesForSpeaker(speaker, wordId) {
      const manifest = state.audioManifest[speaker];
      const rawValue = manifest && manifest.files && manifest.files[wordId];
      return normalizeAudioFiles(rawValue).filter((item) => item.path);
    }

    function recordingCountForSpeaker(speaker) {
      const manifest = state.audioManifest[speaker];
      if (!manifest || !manifest.files) return 0;
      return Object.values(manifest.files).reduce((count, value) => count + normalizeAudioFiles(value).length, 0);
    }

    function audioEntriesForWord(wordId) {
      return state.speakerOrder.flatMap((speaker) => {
        const recordings = audioEntriesForSpeaker(speaker, wordId);
        return recordings.map((recording, index) => ({
          speaker,
          speakerLabel: labelForSpeaker(speaker),
          path: encodeAudioPath(recording.path),
          customLabel: recording.label,
          index,
          total: recordings.length
        }));
      });
    }

    function hasAllSelectedSpeakers(wordId) {
      if (!state.selectedSpeakers.length) return true;
      return state.selectedSpeakers.every((speaker) => audioEntriesForSpeaker(speaker, wordId).length);
    }

    function valueMarkup(value) {
      if (!value) return '<span class="value empty">暂无记录</span>';
      return `<span class="value">${escapeHtml(value)}</span>`;
    }

    const STANDARD_ZHUANG_SYLLABLE = /^(?<onset>ngv|nd|ng|ny|mb|gv|gy|by|my|mw|fw|bw|dw|cw|sw|b|c|d|f|g|h|l|m|n|r|s|v|y)?(?<nucleus>[aeiouyw]+)(?:(?<sonorant>ng|[mnwy])(?<tone>[zjxqh])?|(?<openSonorant>ng|[mnwy])|(?<stop>[ptkbdg])|(?<openTone>[zjxqh])?)$/;
    const STANDARD_ZHUANG_ONSETS = {
      '': '',
      b: 'b',
      by: 'by',
      bw: 'bw',
      c: 'c',
      cw: 'cw',
      d: 'd',
      dw: 'dw',
      f: 'f',
      fw: 'fw',
      g: 'g',
      gv: 'gw',
      gy: 'gy',
      h: 'h',
      l: 'l',
      m: 'm',
      mb: 'mb',
      mw: 'mw',
      my: 'my',
      n: 'n',
      nd: 'nd',
      ng: 'ng',
      ngv: 'ngw',
      ny: 'ny',
      r: 'r',
      s: 's',
      sw: 'sw',
      v: 'w',
      y: 'y'
    };
    const standardSegmentationCache = new Map();

    function parseStandardZhuangSyllable(value) {
      const match = String(value || '').toLowerCase().match(STANDARD_ZHUANG_SYLLABLE);
      if (!match || !match.groups || match.groups.nucleus === 'y') return null;
      return {
        onset: match.groups.onset || '',
        nucleus: match.groups.nucleus || '',
        sonorant: match.groups.sonorant || match.groups.openSonorant || '',
        tone: match.groups.tone || match.groups.openTone || '',
        stop: match.groups.stop || ''
      };
    }

    function splitStandardZhuangToken(token) {
      const lower = String(token || '').trim().toLowerCase();
      if (!lower) return [];
      if (standardSegmentationCache.has(lower)) return standardSegmentationCache.get(lower);

      const memo = new Map();
      const walk = (index) => {
        if (index === lower.length) return { cost: 0, pieces: [] };
        if (memo.has(index)) return memo.get(index);

        let best = null;
        for (let end = index + 1; end <= lower.length; end += 1) {
          const piece = lower.slice(index, end);
          const parsed = parseStandardZhuangSyllable(piece);
          if (!parsed) continue;
          const rest = walk(end);
          if (!rest) continue;

          const cost = (parsed.stop ? 1 : 0) + (index > 0 && !parsed.onset ? 2 : 0);
          const candidate = { cost: cost + rest.cost, pieces: [piece, ...rest.pieces] };

          if (!best || candidate.cost < best.cost || (candidate.cost === best.cost && candidate.pieces.length > best.pieces.length)) {
            best = candidate;
          }
        }

        memo.set(index, best);
        return best;
      };

      const resolved = walk(0);
      const pieces = resolved ? resolved.pieces : [lower];
      standardSegmentationCache.set(lower, pieces);
      return pieces;
    }

    function standardToneNumber(parsed) {
      if (parsed.stop && ['p', 't', 'k'].includes(parsed.stop)) return '55';
      if (parsed.stop && ['b', 'd', 'g'].includes(parsed.stop)) return '33';
      return {
        '': '24',
        z: '31',
        x: '42',
        q: '35',
        h: '33',
        j: '55'
      }[parsed.tone || ''] || '24';
    }

    function romanizeStandardZhuangNucleus(nucleus) {
      return String(nucleus || '')
        .replaceAll('ae', 'a')
        .replaceAll('oe', 'oe')
        .replaceAll('w', 'ue')
        .replaceAll('v', 'w');
    }

    function romanizeStandardZhuangSyllable(syllable) {
      const parsed = parseStandardZhuangSyllable(syllable);
      if (!parsed) return syllable;
      const onset = STANDARD_ZHUANG_ONSETS[parsed.onset] || parsed.onset;
      const nucleus = romanizeStandardZhuangNucleus(parsed.nucleus);
      const sonorant = ({
        y: 'i',
        w: 'u',
        ng: 'ng'
      })[parsed.sonorant] || parsed.sonorant;
      const stop = ({
        b: 'p',
        d: 't',
        g: 'k'
      })[parsed.stop] || parsed.stop;
      return `${onset}${nucleus}${sonorant}${stop}${standardToneNumber(parsed)}`;
    }

    function standardZhuangPronunciation(value) {
      if (!value) return '';
      return String(value)
        .trim()
        .split(/\s+/)
        .flatMap((token) => splitStandardZhuangToken(token).map((syllable) => romanizeStandardZhuangSyllable(syllable)))
        .join(' ');
    }

    function standardValueMarkup(word) {
      if (!word.standard && !word.standardPronunciation) return '<span class="value empty">暂无记录</span>';
      const lines = [];
      if (word.standard) {
        lines.push(`<span class="value">${escapeHtml(word.standard)}</span>`);
      }
      if (word.standardPronunciation) {
        lines.push(`<span class="value-meta">${escapeHtml(word.standardPronunciation)}</span>`);
      }
      return `
        <div class="value-inline value-inline--standard">
          <div class="value-copy value-copy--thai">${lines.join('')}</div>
        </div>
      `;
    }

    function sanitizeFilenamePart(value) {
      return String(value || '')
        .trim()
        .replace(/[\\/:*?"<>|]/g, '_')
        .replace(/\s+/g, ' ') || '_';
    }

    function modernThaiAudioPath(word) {
      if (!word.modernThai) return '';
      const numericId = String(parseInt(word.id, 10) || word.id);
      const fileName = `${sanitizeFilenamePart(numericId)}_${sanitizeFilenamePart(word.modernThai)}_${sanitizeFilenamePart(word.chinese)}.wav`;
      return encodeAudioPath(`wav/modern_thai/${fileName}`);
    }

    function modernThaiAudioMarkup(word) {
      const path = modernThaiAudioPath(word);
      if (!path) return '';
      return `
        <button
          type="button"
          class="play-link"
          data-thai-audio="${path}"
          aria-label="播放现代泰语录音：${escapeHtml(word.modernThai)}"
          aria-pressed="false"
        >
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M8 6.8v10.4c0 .66.73 1.06 1.28.7l8.15-5.2a.83.83 0 0 0 0-1.4L9.28 6.1A.83.83 0 0 0 8 6.8z"/>
          </svg>
        </button>
      `;
    }

    function setActiveThaiPlayButton(button) {
      if (activeThaiPlayButton && activeThaiPlayButton !== button) {
        activeThaiPlayButton.classList.remove('is-playing');
        activeThaiPlayButton.setAttribute('aria-pressed', 'false');
      }
      activeThaiPlayButton = button;
      if (activeThaiPlayButton) {
        activeThaiPlayButton.classList.add('is-playing');
        activeThaiPlayButton.setAttribute('aria-pressed', 'true');
      }
    }

    function clearActiveThaiPlayButton() {
      if (!activeThaiPlayButton) return;
      activeThaiPlayButton.classList.remove('is-playing');
      activeThaiPlayButton.setAttribute('aria-pressed', 'false');
      activeThaiPlayButton = null;
    }

    function setActiveDonglanPlayButton(button) {
      if (activeDonglanPlayButton && activeDonglanPlayButton !== button) {
        activeDonglanPlayButton.classList.remove('is-playing');
        activeDonglanPlayButton.setAttribute('aria-pressed', 'false');
      }
      activeDonglanPlayButton = button;
      if (activeDonglanPlayButton) {
        activeDonglanPlayButton.classList.add('is-playing');
        activeDonglanPlayButton.setAttribute('aria-pressed', 'true');
      }
    }

    function clearActiveDonglanPlayButton() {
      if (!activeDonglanPlayButton) return;
      activeDonglanPlayButton.classList.remove('is-playing');
      activeDonglanPlayButton.setAttribute('aria-pressed', 'false');
      activeDonglanPlayButton = null;
    }

    function stopThaiAudio() {
      thaiAudioPlayer.pause();
      thaiAudioPlayer.currentTime = 0;
      clearActiveThaiPlayButton();
    }

    function stopDonglanAudio() {
      donglanAudioPlayer.pause();
      donglanAudioPlayer.currentTime = 0;
      clearActiveDonglanPlayButton();
    }

    function playModernThaiAudio(rawPath, button) {
      const resolvedUrl = new URL(rawPath, document.baseURI).href;
      const isSameSource = thaiAudioPlayer.src === resolvedUrl;
      const isPlaying = !thaiAudioPlayer.paused && !thaiAudioPlayer.ended;

      if (isSameSource && isPlaying) {
        thaiAudioPlayer.pause();
        thaiAudioPlayer.currentTime = 0;
        clearActiveThaiPlayButton();
        return;
      }

      stopDonglanAudio();
      thaiAudioPlayer.pause();
      thaiAudioPlayer.currentTime = 0;
      thaiAudioPlayer.src = resolvedUrl;
      thaiAudioPlayer.load();
      setActiveThaiPlayButton(button);

      thaiAudioPlayer.play().catch(() => {
        clearActiveThaiPlayButton();
      });
    }

    function playDonglanAudio(rawPath, button) {
      const resolvedUrl = new URL(rawPath, document.baseURI).href;
      const isSameSource = donglanAudioPlayer.src === resolvedUrl;
      const isPlaying = !donglanAudioPlayer.paused && !donglanAudioPlayer.ended;

      if (isSameSource && isPlaying) {
        donglanAudioPlayer.pause();
        donglanAudioPlayer.currentTime = 0;
        clearActiveDonglanPlayButton();
        return;
      }

      stopThaiAudio();
      donglanAudioPlayer.pause();
      donglanAudioPlayer.currentTime = 0;
      donglanAudioPlayer.src = resolvedUrl;
      donglanAudioPlayer.load();
      setActiveDonglanPlayButton(button);

      donglanAudioPlayer.play().catch(() => {
        clearActiveDonglanPlayButton();
      });
    }

    function thaiValueMarkup(word, options = {}) {
      const { withAudio = false } = options;
      if (!word.modernThai && !word.modernThaiRomanization) return '<span class="value empty">暂无记录</span>';

      const lines = [];
      if (word.modernThai) {
        lines.push(`<span class="value">${escapeHtml(word.modernThai)}</span>`);
      }
      if (word.modernThaiRomanization) {
        lines.push(`<span class="value-meta">${escapeHtml(word.modernThaiRomanization)}</span>`);
      }
      return `
        <div class="value-inline value-inline--thai">
          <div class="value-copy value-copy--thai">${lines.join('')}</div>
          ${withAudio ? modernThaiAudioMarkup(word) : ''}
        </div>
      `;
    }

    function donglanSectionMarkup(word) {
      return `
        <div class="grouped-block">
          <div class="pronunciation-row"><div class="label">东兰大同</div><div class="value-block">${valueMarkup(word.donglan)}</div></div>
          ${audioMarkup(word.id)}
        </div>
      `;
    }

    function audioMarkup(wordId) {
      const recordings = audioEntriesForWord(wordId);
      if (!recordings.length) {
        return '';
      }

      const buttons = recordings.map((recording) => {
        const speakerIndex = recording.total > 1 ? String(recording.index + 1) : '';
        const ariaLabel = `播放${recording.speakerLabel}${recording.total > 1 ? `第 ${recording.index + 1} 段` : ''}录音`;
        return `
          <button
            type="button"
            class="recording-button"
            data-donglan-audio="${escapeHtml(recording.path)}"
            aria-label="${escapeHtml(ariaLabel)}"
            aria-pressed="false"
          >
            <span class="recording-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 6.8v10.4c0 .66.73 1.06 1.28.7l8.15-5.2a.83.83 0 0 0 0-1.4L9.28 6.1A.83.83 0 0 0 8 6.8z"/>
              </svg>
            </span>
            <span class="recording-speaker">${escapeHtml(recording.speakerLabel)}${speakerIndex ? `<span class="recording-index">${escapeHtml(speakerIndex)}</span>` : ''}</span>
          </button>
        `;
      }).join('');

      return `
        <div class="audio-box" aria-label="可播放录音">
          ${buttons}
        </div>
      `;
    }

    function tagMarkup(word) {
      const tags = wordTags(word);
      if (!tags.length) return '';
      const chips = tags.map((tagKey) => {
        const definition = TAG_DEFINITIONS.find((item) => item.key === tagKey);
        if (!definition) return '';
        return `<span class="tag-pill" style="${badgeStyle(definition)}">${tagLabelMarkup(definition)}</span>`;
      }).join('');
      return chips ? `<div class="tag-rack" aria-label="词条标签">${chips}</div>` : '';
    }

    function hasSelectedTags(word) {
      if (!state.selectedTags.length) return true;
      const tags = new Set(wordTags(word));
      return state.selectedTags.some((tag) => tags.has(tag));
    }

    function matches(word) {
      const keyword = state.search.trim().toLowerCase();
      if (!hasAllSelectedSpeakers(word.id)) return false;
      if (!hasSelectedTags(word)) return false;
      if (!keyword) return true;
      const haystack = [
        word.id,
        word.chinese,
        word.english,
        word.englishGloss,
        word.standard,
        word.standardPronunciation,
        word.modernThai,
        word.modernThaiRomanization,
        word.donglan,
        word.yantan,
        word.liushui
      ].join(' ').toLowerCase();
      return haystack.includes(keyword);
    }

    function paginate(items) {
      const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      return { items: items.slice(start, end), totalPages, start };
    }

    function renderCards(words) {
      if (!words.length) {
        cards.innerHTML = '';
        cardsEmpty.classList.remove('hidden');
        return;
      }
      cardsEmpty.classList.add('hidden');
      cards.innerHTML = words.map((word) => {
        return `
          <article class="word-card">
            <div class="word-top">
              <div>
                <div class="word-id">No. ${escapeHtml(word.id)}</div>
                <h3>${escapeHtml(word.chinese)}</h3>
              </div>
              ${tagMarkup(word)}
            </div>
            <div class="pronunciations">
              <div class="pronunciation-row"><div class="label">标准壮语</div><div>${standardValueMarkup(word)}</div></div>
              <div class="pronunciation-row"><div class="label">现代泰语</div><div>${thaiValueMarkup(word, { withAudio: true })}</div></div>
              <div class="pronunciation-row"><div class="label">大化岩滩</div><div>${valueMarkup(word.yantan)}</div></div>
              <div class="pronunciation-row"><div class="label">大化流水</div><div>${valueMarkup(word.liushui)}</div></div>
              <div>${donglanSectionMarkup(word)}</div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderTable(words) {
      if (!words.length) {
        tableBody.innerHTML = '';
        tableEmpty.classList.remove('hidden');
        return;
      }
      tableEmpty.classList.add('hidden');
      tableBody.innerHTML = words.map((word) => `
        <tr>
          <td>${escapeHtml(word.id)}</td>
          <td>${escapeHtml(word.chinese)}</td>
          <td>${standardValueMarkup(word)}</td>
          <td>${thaiValueMarkup(word)}</td>
          <td>${valueMarkup(word.yantan)}</td>
          <td>${valueMarkup(word.liushui)}</td>
          <td class="table-audio">${valueMarkup(word.donglan)}${audioMarkup(word.id)}</td>
        </tr>
      `).join('');
    }

    function renderSpeakerButtons() {
      speakerPicker.innerHTML = state.speakerOrder.map((speaker) => (
        `<label class="toggle"><input type="checkbox" data-speaker="${speaker}" ${state.selectedSpeakers.includes(speaker) ? 'checked' : ''}><span class="toggle-box" aria-hidden="true"></span><span>${labelForSpeaker(speaker)} (${recordingCountForSpeaker(speaker)})</span></label>`
      )).join('');
    }

    function renderTagButtons() {
      tagPicker.innerHTML = TAG_DEFINITIONS.map((tag) => (
        `<label class="toggle"><input type="checkbox" data-tag="${tag.key}" ${state.selectedTags.includes(tag.key) ? 'checked' : ''}><span class="toggle-box" aria-hidden="true"></span><span>${tagLabelMarkup(tag)}</span></label>`
      )).join('');
    }

    function renderViewButtons() {
      viewPicker.querySelectorAll('button').forEach((button) => button.classList.toggle('active', button.dataset.view === state.view));
      cardsView.classList.toggle('hidden', state.view !== 'cards');
      tableView.classList.toggle('hidden', state.view !== 'table');
    }

    function renderPagination(totalPages) {
      const build = () => `
        <button type="button" class="page-button" data-page-nav="prev" ${state.page === 1 ? 'disabled' : ''}>上一页</button>
        <label class="page-button active page-jump">第 <input class="page-input" type="text" inputmode="numeric" pattern="[0-9]*" min="1" max="${totalPages}" value="${state.page}" aria-label="页码"> / ${totalPages} 页</label>
        <button type="button" class="page-button" data-page-nav="next" ${state.page === totalPages ? 'disabled' : ''}>下一页</button>
      `;
      paginationTop.innerHTML = totalPages > 1 ? build() : '';
      paginationBottom.innerHTML = totalPages > 1 ? build() : '';
    }

    function render() {
      if (!state.loaded) return;
      if (activeThaiPlayButton && !activeThaiPlayButton.isConnected) {
        activeThaiPlayButton = null;
      }
      if (activeDonglanPlayButton && !activeDonglanPlayButton.isConnected) {
        activeDonglanPlayButton = null;
      }
      loadingState.classList.add('hidden');

      const filtered = state.words.filter(matches);
      const paginated = paginate(filtered);
      resultsCopy.textContent = '';
      resultsCopy.parentElement.classList.add('hidden');
      renderSpeakerButtons();
      renderTagButtons();
      renderViewButtons();
      renderPagination(paginated.totalPages);
      renderCards(paginated.items);
      renderTable(paginated.items);
    }

    function boot() {
      const words = (window.WORDS_DATA || []).map((word) => ({
        ...word,
        standardPronunciation: standardZhuangPronunciation(word.standard)
      }));
      const audioManifest = window.AUDIO_MANIFEST_DATA;
      if (!words || !audioManifest) {
        resultsCopy.textContent = '页面数据尚未加载完成，请稍后刷新重试。';
        return;
      }
      state.words = words;
      state.audioManifest = audioManifest;
      state.speakerOrder = Object.keys(audioManifest);
      state.selectedSpeakers = [];
      state.selectedTags = [];
      state.loaded = true;
      render();
    }

    searchInput.addEventListener('input', (event) => { state.search = event.target.value; state.page = 1; render(); });
    speakerPicker.addEventListener('change', (event) => {
      const input = event.target.closest('input[data-speaker]');
      if (!input) return;
      const speaker = input.dataset.speaker;
      if (input.checked) {
        if (!state.selectedSpeakers.includes(speaker)) state.selectedSpeakers.push(speaker);
      } else {
        state.selectedSpeakers = state.selectedSpeakers.filter((item) => item !== speaker);
      }
      state.page = 1;
      render();
    });
    tagPicker.addEventListener('change', (event) => {
      const input = event.target.closest('input[data-tag]');
      if (!input) return;
      const tag = input.dataset.tag;
      if (input.checked) {
        if (!state.selectedTags.includes(tag)) state.selectedTags.push(tag);
      } else {
        state.selectedTags = state.selectedTags.filter((item) => item !== tag);
      }
      state.page = 1;
      render();
    });
    viewPicker.addEventListener('click', (event) => { const button = event.target.closest('button[data-view]'); if (!button) return; state.view = button.dataset.view; render(); });
    thaiAudioPlayer.addEventListener('ended', clearActiveThaiPlayButton);
    thaiAudioPlayer.addEventListener('pause', () => {
      if (thaiAudioPlayer.ended) return;
      clearActiveThaiPlayButton();
    });
    donglanAudioPlayer.addEventListener('ended', clearActiveDonglanPlayButton);
    donglanAudioPlayer.addEventListener('pause', () => {
      if (donglanAudioPlayer.ended) return;
      clearActiveDonglanPlayButton();
    });
    document.addEventListener('click', (event) => {
      const thaiAudioButton = event.target.closest('button[data-thai-audio]');
      if (thaiAudioButton) {
        playModernThaiAudio(thaiAudioButton.dataset.thaiAudio, thaiAudioButton);
        return;
      }
      const donglanAudioButton = event.target.closest('button[data-donglan-audio]');
      if (donglanAudioButton) {
        playDonglanAudio(donglanAudioButton.dataset.donglanAudio, donglanAudioButton);
        return;
      }
      const pageButton = event.target.closest('button[data-page-nav]');
      if (pageButton) {
        state.page += pageButton.dataset.pageNav === 'next' ? 1 : -1;
        render();
        window.scrollTo({ top: document.querySelector('.panel').offsetTop - 12, behavior: 'smooth' });
      }
    });
    document.addEventListener('change', (event) => {
      const pageInput = event.target.closest('.page-input');
      if (!pageInput) return;
      const max = Number(pageInput.max) || 1;
      const nextPage = Math.min(max, Math.max(1, Number.parseInt(pageInput.value, 10) || state.page));
      if (nextPage === state.page) {
        pageInput.value = state.page;
        return;
      }
      state.page = nextPage;
      render();
      window.scrollTo({ top: document.querySelector('.panel').offsetTop - 12, behavior: 'smooth' });
    });
    document.addEventListener('keydown', (event) => {
      const pageInput = event.target.closest('.page-input');
      if (!pageInput || event.key !== 'Enter') return;
      event.preventDefault();
      pageInput.blur();
    });

    window.addEventListener('DOMContentLoaded', boot);
  </script>
</body>
</html>
